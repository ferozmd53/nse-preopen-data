name: NSE Pre-Open Data Fetcher

on:
  schedule:
    - cron: '47 12 * * 1-5'   # 12:47 PM UTC = 6:17 PM IST
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Fetch NSE data
        run: python fetch_data.py
      
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "NSE pre-open data $(date +'%Y-%m-%d %H:%M')"
          git push
