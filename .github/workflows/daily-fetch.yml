- name: Commit and push if changed
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"
    
    echo "🔍 Checking for changes..."
    git status
    
    echo "🔍 Adding data folder..."
    git add data/
    
    echo "🔍 Checking diff..."
    git diff --staged --quiet || echo "📝 Changes detected, committing..."
    git diff --staged --quiet || git commit -m "Daily NSE pre-open data $(date +'%Y-%m-%d')"
    
    echo "🔍 Pushing changes..."
    git push
    
    echo "✅ Done!"
